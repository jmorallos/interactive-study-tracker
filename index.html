<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body>
  <main id="app">
    <section class="page active" id="page-home">

      <header class="page-header">
        <h1>Good day 👋</h1>
        <p id="home-date">Saturday, May 9</p>
      </header>

      <div id="countdown-wrap">
        <span>1</span>
        <span>days until fitness</span>
      </div>

      <div class="stat-row">
        <div class="stat">
          <span class="val" id="stat-tasks">0</span>
          <span class="lbl">tasks today</span>
        </div>
        <div class="stat">
          <span class="val" id="stat-done">0</span>
          <span class="lbl">completed</span>
        </div>
      </div>

      <div class="content-container">
        <div class="card">
          <h3>Quick add</h3>
          <div class="input-group">
            <input type="text" id="quick-input" placeholder="e.g. Math quiz Friday urgent"
              aria-label="Quick add task" />
            <button id="quick-add-btn" class="btn btn-primary btn-sm">
              <i class="ti ti-plus"></i>
            </button>
          </div>
          <p class="hint-text">
            Tip: include a subject name + day + "urgent" to auto-sort
          </p>
        </div>

        <div class="card">
          <h3>Upcoming tasks</h3>
          <div id="home-tasks-list"></div>
        </div>
      </div>

      <button id="fab" aria-label="Add task">
        <i class="ti ti-plus"></i>
      </button>
    </section>
  </main>
  <nav id="nav">
    <button>
      <svg>
        <use href="./assets/icons/icons.svg#icon-house"></use>
      </svg>
      <span>Home</span>
    </button>

    <button>
      <svg>
        <use href="./assets/icons/icons.svg#icon-timer"></use>
      </svg>
      <span>Timer</span>
    </button>

    <button>
      <svg>
        <use href="./assets/icons/icons.svg#icon-task"></use>
      </svg>
      <span>Tasks</span>
    </button>

    <button>
      <svg>
        <use href="./assets/icons/icons.svg#icon-notes"></use>
      </svg>
      <span>Notes</span>
    </button>

    <button>
      <svg>
        <use href="./assets/icons/icons.svg#icon-music"></use>
      </svg>
      <span>Ambient</span>
    </button>
  </nav>
</body>

</html>
